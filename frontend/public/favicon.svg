<?xml version="1.0" encoding="UTF-8"?>
<!--
  The Pond favicon — Duck Yellow sur fond cream avec safe zone maskable.

  ViewBox 100×100. Le contenu utile (cream + duck) reste dans le carré
  central 80×80 pour survivre aux masques Android (cercle, squircle, etc.).
  Pour le rendu favicon non-masqué, on remplit aussi le bord à cream
  (bg uniforme).
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- Fond cream uniforme (couvre toute la zone, y compris hors safe zone) -->
  <rect width="100" height="100" fill="#FAF3E3"/>

  <!-- Duck centré, scalé pour tenir dans 60×60 (safe zone Android) -->
  <g transform="translate(20, 25) scale(0.9375)">
    <!-- ombre -->
    <ellipse cx="32" cy="44" rx="26" ry="3.5" fill="#1F2933" opacity=".12"/>
    <!-- corps -->
    <ellipse cx="30" cy="32" rx="24" ry="11" fill="#FFC93C"/>
    <!-- ventre -->
    <ellipse cx="26" cy="35" rx="16" ry="5" fill="#FFE08A" opacity=".7"/>
    <!-- queue -->
    <path d="M52 28 Q60 24 58 32 Q54 32 52 30 Z" fill="#F2B400"/>
    <!-- tête -->
    <circle cx="46" cy="20" r="11" fill="#FFC93C"/>
    <!-- bec -->
    <path d="M55 19 L62 22 L55 25 Z" fill="#F2B400"/>
    <path d="M55 21 L60 22.5 L55 24 Z" fill="#C9881A" opacity=".5"/>
    <!-- œil -->
    <circle cx="49" cy="17" r="2.2" fill="#1F2933"/>
    <circle cx="49.7" cy="16.4" r=".7" fill="#FAF3E3"/>
    <!-- aile -->
    <path d="M28 26 Q34 22 40 28 Q36 32 28 30 Z" fill="#F2B400"/>
  </g>
</svg>
